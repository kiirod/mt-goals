  <link rel="icon" type="image/png" href="/images/mtg.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="/themes.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--mt-bg-primary);
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .logo {
      height: 70px;
      width: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
    }

    header a.mt-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 6px;
    }
    header a.mt-link:hover { color: rgba(255,255,255,0.8); }
    header a.mt-link svg { width: 11px; height: 11px; flex-shrink: 0; }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .add-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .add-btn {
      flex: 1;
      background-color: var(--mt-bg-card);
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.45);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .add-btn:hover { background-color: var(--mt-bg-card-hover); color: rgba(255,255,255,0.7); }

    .icon-action-btn {
      background-color: var(--mt-bg-card);
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.55;
      transition: background 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .icon-action-btn:hover { background-color: var(--mt-bg-card-hover); opacity: 1; }
    .icon-action-btn svg { width: 20px; height: 20px; display: block; }

    #notifBtn {
      background-color: var(--mt-bg-card);
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.55;
      transition: background 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    #notifBtn:hover { background-color: var(--mt-bg-card-hover); opacity: 1; }
    #notifBtn svg { width: 20px; height: 20px; display: block; transition: fill 0.25s; }
    #notifBtn.active { opacity: 1; }
    #notifBtn.active svg path { fill: rgba(255,255,255,0.9); stroke: rgba(255,255,255,0.9); }

    .goal-input-row {
      display: flex;
      align-items: center;
      background-color: var(--mt-bg-card);
      border-radius: 8px;
      padding: 10px 14px;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }
    .goal-input-row textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      resize: none;
      height: 42px;
      line-height: 1.5;
      padding-top: 4px;
    }
    .goal-input-row textarea::placeholder { color: rgba(255,255,255,0.3); }

    .input-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .char-counter { color: rgba(255,255,255,0.5); font-size: 0.72rem; white-space: nowrap; }

    .word-counter { font-size: 0.72rem; white-space: nowrap; transition: color 0.2s, opacity 0.35s; opacity: 1; }
    .word-counter.under { color: var(--mt-accent); opacity: 1; }
    .word-counter.met { opacity: 0; pointer-events: none; }

    .pin-btn, .cancel-btn {
      background: none;
      border: none;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s, opacity 0.15s;
    }
    .pin-btn { color: var(--mt-accent); }
    .pin-btn:hover { background: var(--mt-accent-muted); }
    .pin-btn.disabled { opacity: 0.35; cursor: not-allowed; }
    .pin-btn.disabled:hover { background: none; }
    .cancel-btn { color: rgba(255,255,255,0.45); }
    .cancel-btn:hover { background: rgba(255,255,255,0.07); }

    .goal-card {
      display: flex;
      align-items: flex-start;
      background-color: var(--mt-bg-card);
      border-radius: 8px;
      padding: 14px 16px;
      gap: 14px;
      animation: fadeIn 0.2s ease;
      position: relative;
      transition: box-shadow 0.15s, background 0.15s;
      user-select: none;
    }
    .goal-card.dragging { opacity: 0.45; box-shadow: none; }
    .goal-card.drag-over { box-shadow: 0 0 0 2px var(--mt-accent); }
    .goal-card .goal-text { flex: 1; color: #fff; font-size: 0.88rem; line-height: 1.6; word-break: break-word; }

    .goal-card-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

    .delete-btn {
      background: none; border: none; cursor: pointer; padding: 2px;
      flex-shrink: 0; opacity: 0.55; transition: opacity 0.15s; display: flex; align-items: center;
    }
    .delete-btn:hover { opacity: 1; }
    .delete-btn svg { width: 18px; height: 18px; display: block; }

    .drag-handle {
      background: none; border: none; cursor: grab; padding: 2px 4px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; opacity: 0.35; transition: opacity 0.15s; touch-action: none; height: 100%; align-self: center;
    }
    .drag-handle:hover { opacity: 0.9; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle span { display: block; width: 3.5px; height: 3.5px; border-radius: 50%; background: #fff; }
    .drag-handle.hidden { visibility: hidden; pointer-events: none; }

    .drop-indicator { height: 2px; background: var(--mt-accent); border-radius: 2px; margin: -6px 0; animation: fadeIn 0.1s ease; }

    .fading { animation: fadeOut 0.35s ease forwards; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.97); } }

    .footer { position: fixed; bottom: 28px; left: 28px; display: flex; align-items: center; gap: 4px; }
    .footer-right { position: fixed; bottom: 28px; right: 28px; display: flex; align-items: center; gap: 4px; }

    .footer-link {
      display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
      cursor: pointer; color: rgba(255,255,255,0.5); font-family: 'Roboto Mono', monospace;
      font-size: 0.78rem; font-weight: 300; text-decoration: none; padding: 6px 8px;
      border-radius: 4px; transition: color 0.2s;
    }
    .footer-link:hover { color: rgba(255,255,255,1); }
    .footer-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: inherit; }

    .footer-divider { color: rgba(255,255,255,0.2); font-size: 0.78rem; user-select: none; }

    .theme-toggle-btn {
      display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
      cursor: pointer; color: rgba(255,255,255,0.5); font-family: 'Roboto Mono', monospace;
      font-size: 0.78rem; font-weight: 300; text-decoration: none; padding: 6px 8px;
      border-radius: 4px; transition: color 0.2s;
    }
    .theme-toggle-btn:hover { color: rgba(255,255,255,1); }
    .theme-toggle-btn svg { width: 15px; height: 15px; flex-shrink: 0; opacity: inherit; }

    .goal-edit-row {
      display: flex; align-items: flex-start; background-color: var(--mt-bg-card);
      border-radius: 8px; padding: 10px 14px; gap: 12px; animation: fadeIn 0.2s ease;
      box-shadow: 0 0 0 2px var(--mt-accent);
    }
    .goal-edit-row textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-family: 'Roboto Mono', monospace; font-size: 0.88rem;
      resize: none; min-height: 42px; line-height: 1.5; padding-top: 4px;
    }
    .edit-btn {
      background: none; border: none; cursor: pointer; padding: 2px;
      flex-shrink: 0; opacity: 0.55; transition: opacity 0.15s; display: flex; align-items: center;
    }
    .edit-btn:hover { opacity: 1; }
    .edit-btn svg { width: 18px; height: 18px; display: block; }

    .age-btn {
      background: none; border: none; cursor: default; padding: 2px;
      flex-shrink: 0; opacity: 0.55; transition: opacity 0.15s; display: flex; align-items: center;
      position: relative;
    }
    .age-btn:hover { opacity: 1; }
    .age-btn svg { width: 18px; height: 18px; display: block; }

    .age-btn.stale { cursor: pointer; }

    .age-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e2023;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 6px 10px;
      color: rgba(255,255,255,0.75);
      font-size: 0.68rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    }
    .age-btn:hover .age-tooltip { opacity: 1; }

    .empty-state {
      color: rgba(255,255,255,0.25);
      font-size: 0.88rem;
      text-align: center;
      padding: 32px 0 8px;
      user-select: none;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; animation: fadeIn 0.15s ease;
    }
    .modal-box {
      background: var(--mt-bg-card); border-radius: 10px; padding: 28px 28px 22px;
      max-width: 400px; width: calc(100% - 40px); font-family: 'Roboto Mono', monospace;
      color: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.5); animation: fadeIn 0.18s ease;
    }
    .modal-box p { font-size: 0.88rem; line-height: 1.7; color: rgba(255,255,255,0.85); margin-bottom: 22px; }
    .modal-box p .override-word { color: #ff4d4d; text-decoration: underline; font-weight: 500; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-no-btn, .modal-yes-btn {
      font-family: 'Roboto Mono', monospace; font-size: 0.82rem; border: none;
      border-radius: 6px; padding: 8px 18px; cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    .modal-no-btn { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
    .modal-no-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .modal-yes-btn { background: var(--mt-accent); color: #1a1a1a; font-weight: 600; }
    .modal-yes-btn:hover { background: var(--mt-accent-hover); }

    @media (hover: none) and (pointer: coarse) {
      .delete-btn, .edit-btn { padding: 6px; }
      .delete-btn svg, .edit-btn svg { width: 22px; height: 22px; }
      .drag-handle { padding: 6px 8px; gap: 4px; opacity: 0.55; }
      .drag-handle span { width: 4px; height: 4px; }
    }

    @media (max-width: 480px) {
      body { padding: 36px 12px 120px; }
      header { margin-bottom: 32px; }
      header .logo { height: 54px; }
      .add-row { flex-wrap: wrap; gap: 8px; }
      .add-btn { flex: 1 1 100%; font-size: 0.82rem; padding: 13px 16px; }
      #exportBtn, #importBtn, #notifBtn { flex: 1; height: 42px; justify-content: center; }
      .goal-input-row { flex-direction: column; align-items: stretch; padding: 12px; gap: 8px; }
      .goal-input-row textarea { font-size: 0.9rem; height: auto; min-height: 42px; }
      .input-actions { justify-content: flex-end; flex-wrap: wrap; gap: 6px; }
      .goal-edit-row { flex-direction: column; align-items: stretch; padding: 12px; gap: 8px; }
      .goal-edit-row textarea { font-size: 0.9rem; }
      .goal-card { padding: 12px 12px; gap: 10px; }
      .goal-card .goal-text { font-size: 0.84rem; }
      .footer, .footer-right {
        position: fixed; bottom: 0; left: 0; right: 0; width: 100%;
        display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 0;
        background-color: rgba(49,51,56,0.97); backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px); padding: 6px 8px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .footer {
        bottom: 0; padding: 6px 8px; background-color: rgba(49,51,56,0.97);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        border-top: 1px solid rgba(255,255,255,0.06); flex-wrap: wrap; row-gap: 0;
      }
      .footer-right {
        bottom: 0; padding: 6px 8px; background: transparent;
        backdrop-filter: none; -webkit-backdrop-filter: none; border-top: none; pointer-events: none;
      }
      .footer-right * { pointer-events: auto; }
      .footer-link { font-size: 0.72rem; padding: 4px 6px; }
      .footer-link svg { width: 13px; height: 13px; }
      .theme-toggle-btn { font-size: 0.72rem; padding: 4px 6px; }
      .theme-toggle-btn svg { width: 13px; height: 13px; }
      .footer-divider { font-size: 0.72rem; }
      .modal-box { padding: 22px 18px 18px; border-radius: 8px; }
      .modal-box p { font-size: 0.82rem; }
      .modal-no-btn, .modal-yes-btn { font-size: 0.78rem; padding: 8px 14px; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      body { padding: 48px 20px 100px; }
      .footer, .footer-right { bottom: 16px; }
      .footer { left: 12px; }
      .footer-right { right: 12px; }
      .footer-link, .theme-toggle-btn, .footer-divider { font-size: 0.74rem; }
    }

    @media (max-height: 500px) {
      .footer, .footer-right { position: static; margin-top: 24px; }
      .footer { justify-content: center; }
      .footer-right { justify-content: center; width: 100%; }
      body { padding-bottom: 24px; }
    }
  </style>
</head>

<script>
const MT_STORAGE_KEY   = 'monkeytype_goals';
const MT_NOTIF_KEY     = 'monkeytype_goals_notif_schedule';
const MT_NOTIF_GRANTED = 'monkeytype_goals_notif_granted';
const MT_NOTIF_NEXT    = 'monkeytype_goals_notif_next';

const container   = document.getElementById('goalsContainer');
const addRow      = document.getElementById('addRow');
const addBtn      = document.getElementById('addBtn');
const MAX         = 180;
const MIN_LETTERS = 5;

const themeBtn   = document.getElementById('themeToggleBtn');
const themeLabel = document.getElementById('themeLabel');
const exportBtn  = document.getElementById('exportBtn');
const importBtn  = document.getElementById('importBtn');
const notifBtn   = document.getElementById('notifBtn');

themeLabel.textContent = MTThemes.THEMES[MTThemes.getActiveTheme()].name;
themeBtn.addEventListener('click', () => {
  themeLabel.textContent = MTThemes.cycleTheme();
});

function loadGoals() {
  try { return JSON.parse(localStorage.getItem(MT_STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveGoals(goals) {
  localStorage.setItem(MT_STORAGE_KEY, JSON.stringify(goals));
  syncToIDB().catch(() => {});
}

function updateDragHandles() {
  const cards = getCards();
  const show = cards.length >= 2;
  cards.forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (handle) {
      if (show) handle.classList.remove('hidden');
      else handle.classList.add('hidden');
    }
  });
}

let dragSrc = null, dragId = null, indicator = null;

function getCards() { return [...container.querySelectorAll('.goal-card')]; }
function removeIndicator() { if (indicator) { indicator.remove(); indicator = null; } }
function insertIndicatorBefore(el) {
  removeIndicator();
  indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  container.insertBefore(indicator, el);
}
function insertIndicatorAfter(el) {
  removeIndicator();
  indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  el.after(indicator);
}

function onHandleMouseDown(e, card, id) {
  e.preventDefault();
  dragSrc = card; dragId = id;
  card.classList.add('dragging');
  function onMouseMove(ev) {
    const cards = getCards().filter(c => c !== dragSrc);
    removeIndicator();
    let placed = false;
    for (const c of cards) {
      const rect = c.getBoundingClientRect();
      if (ev.clientY < rect.top + rect.height / 2) { insertIndicatorBefore(c); placed = true; break; }
    }
    if (!placed && cards.length > 0) insertIndicatorAfter(cards[cards.length - 1]);
  }
  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    finishDrag();
  }
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onHandleTouchStart(e, card, id) {
  dragSrc = card; dragId = id;
  card.classList.add('dragging');
  function onTouchMove(ev) {
    ev.preventDefault();
    const touch = ev.touches[0];
    const cards = getCards().filter(c => c !== dragSrc);
    removeIndicator();
    let placed = false;
    for (const c of cards) {
      const rect = c.getBoundingClientRect();
      if (touch.clientY < rect.top + rect.height / 2) { insertIndicatorBefore(c); placed = true; break; }
    }
    if (!placed && cards.length > 0) insertIndicatorAfter(cards[cards.length - 1]);
  }
  function onTouchEnd() {
    card.removeEventListener('touchmove', onTouchMove);
    card.removeEventListener('touchend', onTouchEnd);
    finishDrag();
  }
  card.addEventListener('touchmove', onTouchMove, { passive: false });
  card.addEventListener('touchend', onTouchEnd);
}

function finishDrag() {
  if (!dragSrc) return;
  dragSrc.classList.remove('dragging');
  if (indicator) { container.insertBefore(dragSrc, indicator); removeIndicator(); }
  dragSrc = null; dragId = null;
  const newOrder = getCards().map(c => c.dataset.id);
  const goals = loadGoals();
  const map = Object.fromEntries(goals.map(g => [g.id, g]));
  saveGoals(newOrder.map(id => map[id]).filter(Boolean));
}

function getAgeLabel(createdAt) {
  if (!createdAt) return null;
  const ms = Date.now() - createdAt;
  const minutes = Math.floor(ms / 60000);
  const hours = Math.floor(ms / 3600000);
  const days = Math.floor(ms / 86400000);
  if (minutes < 1) return 'made just now';
  if (minutes < 60) return `made ${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
  if (hours < 24) return `made ${hours} hour${hours !== 1 ? 's' : ''} ago`;
  if (days < 30) return `made ${days} day${days !== 1 ? 's' : ''} ago`;
  const months = Math.floor(days / 30);
  if (months < 12) return `made ${months} month${months !== 1 ? 's' : ''} ago`;
  const years = Math.floor(months / 12);
  return `made ${years} year${years !== 1 ? 's' : ''} ago`;
}

function isStale(createdAt) {
  if (!createdAt) return false;
  return Date.now() - createdAt > 30 * 24 * 60 * 60 * 1000;
}

function updateEmptyState() {
  const existing = container.querySelector('.empty-state');
  const hasCards = getCards().length > 0;
  if (hasCards && existing) { existing.remove(); return; }
  if (!hasCards && !existing) {
    const el = document.createElement('div');
    el.className = 'empty-state';
    el.textContent = 'No goals yet.';
    container.appendChild(el);
  }
}

function showStalePopup(id, ageBtn) {
  const existing = document.getElementById('stale-popup-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'stale-popup-overlay';
  Object.assign(overlay.style, {
    position: 'fixed', inset: '0', background: 'rgba(0,0,0,0.6)',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    zIndex: '99999', animation: 'fadeIn 0.15s ease',
  });

  const box = document.createElement('div');
  box.className = 'modal-box';

  const p = document.createElement('p');
  p.textContent = 'Are you still working on this goal?';

  const actions = document.createElement('div');
  actions.className = 'modal-actions';

  const yesBtn = document.createElement('button');
  yesBtn.className = 'modal-yes-btn';
  yesBtn.textContent = 'Yes';

  const noBtn = document.createElement('button');
  noBtn.className = 'modal-no-btn';
  noBtn.textContent = 'No';

  yesBtn.addEventListener('click', () => {
    overlay.remove();
    const goals = loadGoals();
    const idx = goals.findIndex(g => g.id === id);
    if (idx !== -1) {
      goals[idx].createdAt = Date.now();
      saveGoals(goals);
    }
    ageBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 7V12L9.5 13.5M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="age-tooltip">made just now</span>`;
    ageBtn.classList.remove('stale');
    ageBtn.style.cursor = 'default';
  });

  noBtn.addEventListener('click', () => {
    overlay.remove();
    const card = container.querySelector(`.goal-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('fading');
      card.addEventListener('animationend', () => {
        card.remove();
        saveGoals(loadGoals().filter(g => g.id !== id));
        updateDragHandles();
        updateEmptyState();
      });
    }
  });

  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
  });

  actions.appendChild(yesBtn);
  actions.appendChild(noBtn);
  box.appendChild(p);
  box.appendChild(actions);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function renderGoal(text, id, createdAt) {
  const card = document.createElement('div');
  card.className = 'goal-card';
  card.dataset.id = id;

  const textEl = document.createElement('span');
  textEl.className = 'goal-text';
  textEl.textContent = text;

  const actions = document.createElement('div');
  actions.className = 'goal-card-actions';

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.title = 'Edit goal';
  editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M8.56078 20.2501L20.5608 8.25011L15.7501 3.43945L3.75012 15.4395V20.2501H8.56078ZM15.7501 5.56077L18.4395 8.25011L16.5001 10.1895L13.8108 7.50013L15.7501 5.56077ZM12.7501 8.56079L15.4395 11.2501L7.93946 18.7501H5.25012L5.25012 16.0608L12.7501 8.56079Z" fill="#ffffff"></path></svg>`;
  editBtn.addEventListener('click', () => showEditRow(card, id, textEl.textContent));

  const ageBtn = document.createElement('button');
  ageBtn.className = 'age-btn';
  const stale = isStale(createdAt);
  const ageLabel = getAgeLabel(createdAt) || 'made just now';
  if (stale) {
    ageBtn.classList.add('stale');
    ageBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="17" r="1" fill="#ffffff"></circle><path d="M12 10L12 14" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M3.44722 18.1056L10.2111 4.57771C10.9482 3.10361 13.0518 3.10362 13.7889 4.57771L20.5528 18.1056C21.2177 19.4354 20.2507 21 18.7639 21H5.23607C3.7493 21 2.78231 19.4354 3.44722 18.1056Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="age-tooltip">${ageLabel}</span>`;
    ageBtn.addEventListener('click', () => showStalePopup(id, ageBtn));
  } else {
    ageBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 7V12L9.5 13.5M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg><span class="age-tooltip">${ageLabel}</span>`;
  }

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'Remove goal';
  delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M21.5821 5.54289C21.9726 5.93342 21.9726 6.56658 21.5821 6.95711L10.2526 18.2867C9.86452 18.6747 9.23627 18.6775 8.84475 18.293L2.29929 11.8644C1.90527 11.4774 1.89956 10.8443 2.28655 10.4503C2.67354 10.0562 3.30668 10.0505 3.70071 10.4375L9.53911 16.1717L20.1679 5.54289C20.5584 5.15237 21.1916 5.15237 21.5821 5.54289Z" fill="#ffffff"/></svg>`;
  delBtn.addEventListener('click', () => {
    launchConfetti();
    card.classList.add('fading');
    card.addEventListener('animationend', () => {
      card.remove();
      saveGoals(loadGoals().filter(g => g.id !== id));
      updateDragHandles();
      updateEmptyState();
    });
  });

  const handle = document.createElement('button');
  handle.className = 'drag-handle';
  handle.title = 'Drag to reorder';
  handle.innerHTML = `<span></span><span></span><span></span>`;
  handle.addEventListener('mousedown', e => onHandleMouseDown(e, card, id));
  handle.addEventListener('touchstart', e => onHandleTouchStart(e, card, id), { passive: true });

  actions.appendChild(ageBtn);
  actions.appendChild(editBtn);
  actions.appendChild(delBtn);
  card.appendChild(handle);
  card.appendChild(textEl);
  card.appendChild(actions);
  container.appendChild(card);
  updateDragHandles();
  updateEmptyState();
}

function hideAddRowButtons() {
  addBtn.style.display = 'none';
  exportBtn.style.display = 'none';
  importBtn.style.display = 'none';
  notifBtn.style.display = 'none';
}
function showAddRowButtons() {
  addBtn.style.display = '';
  exportBtn.style.display = '';
  importBtn.style.display = '';
  notifBtn.style.display = '';
}

function showInputRow() {
  hideAddRowButtons();

  const row = document.createElement('div');
  row.className = 'goal-input-row';

  const ta = document.createElement('textarea');
  ta.placeholder = 'Type your goal here...';
  ta.maxLength = MAX;

  const actionsEl = document.createElement('div');
  actionsEl.className = 'input-actions';

  const pinBtn = document.createElement('button');
  pinBtn.className = 'pin-btn disabled';
  pinBtn.textContent = 'Pin';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';

  const counter = document.createElement('span');
  counter.className = 'char-counter';
  counter.textContent = `0/${MAX}`;

  const wordCounter = document.createElement('span');
  wordCounter.className = 'word-counter under';
  wordCounter.textContent = `0/${MIN_LETTERS}`;

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    counter.textContent = `${ta.value.length}/${MAX}`;
    const letters = ta.value.trim().length;
    if (letters < MIN_LETTERS) wordCounter.textContent = `${letters}/${MIN_LETTERS}`;
    if (letters >= MIN_LETTERS) {
      wordCounter.classList.remove('under');
      wordCounter.classList.add('met');
      pinBtn.classList.remove('disabled');
    } else {
      wordCounter.classList.remove('met');
      wordCounter.classList.add('under');
      pinBtn.classList.add('disabled');
    }
  });

  function pinGoal() {
    const text = ta.value.trim();
    if (text.length < MIN_LETTERS) return;
    if (!text) { row.remove(); showAddRowButtons(); return; }
    const id = Date.now().toString();
    const createdAt = Date.now();
    const goals = loadGoals();
    goals.push({ id, text, createdAt });
    saveGoals(goals);
    row.remove();
    renderGoal(text, id, createdAt);
    showAddRowButtons();
  }

  function cancelGoal() { row.remove(); showAddRowButtons(); }

  pinBtn.addEventListener('click', pinGoal);
  cancelBtn.addEventListener('click', cancelGoal);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); pinGoal(); }
    if (e.key === 'Escape') cancelGoal();
  });

  actionsEl.appendChild(wordCounter);
  actionsEl.appendChild(counter);
  actionsEl.appendChild(pinBtn);
  actionsEl.appendChild(cancelBtn);
  row.appendChild(ta);
  row.appendChild(actionsEl);
  container.insertBefore(row, container.firstChild);
  ta.focus();
}

addBtn.addEventListener('click', showInputRow);
loadGoals().forEach(g => renderGoal(g.text, g.id, g.createdAt));
updateEmptyState();

document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (e.key === 'g' && tag !== 'TEXTAREA' && tag !== 'INPUT') {
    e.preventDefault();
    showInputRow();
  }
});

function launchConfetti() {
  const defaults = { particleCount: 130, spread: 120, colors: ['#e2b714', '#0096FF', '#FF69B4'] };
  confetti({ ...defaults, angle: 60, origin: { x: 0, y: 1 } });
  confetti({ ...defaults, angle: 120, origin: { x: 1, y: 1 } });
}

function showEditRow(card, id, currentText) {
  const editRow = document.createElement('div');
  editRow.className = 'goal-edit-row';

  const ta = document.createElement('textarea');
  ta.value = currentText;
  ta.maxLength = MAX;

  const actionsEl = document.createElement('div');
  actionsEl.className = 'input-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'pin-btn';
  saveBtn.textContent = 'Save';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';

  const counter = document.createElement('span');
  counter.className = 'char-counter';
  counter.textContent = `${currentText.length}/${MAX}`;

  ta.addEventListener('input', () => {
    counter.textContent = `${ta.value.length}/${MAX}`;
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });

  function saveEdit() {
    const newText = ta.value.trim();
    if (newText.length < MIN_LETTERS) return;
    const goals = loadGoals();
    const idx = goals.findIndex(g => g.id === id);
    if (idx !== -1) { goals[idx].text = newText; saveGoals(goals); }
    card.querySelector('.goal-text').textContent = newText;
    editRow.remove();
    card.style.display = '';
  }
  function cancelEdit() { editRow.remove(); card.style.display = ''; }

  saveBtn.addEventListener('click', saveEdit);
  cancelBtn.addEventListener('click', cancelEdit);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
    if (e.key === 'Escape') cancelEdit();
  });

  actionsEl.appendChild(counter);
  actionsEl.appendChild(saveBtn);
  actionsEl.appendChild(cancelBtn);
  editRow.appendChild(ta);
  editRow.appendChild(actionsEl);
  card.style.display = 'none';
  card.after(editRow);
  ta.focus();
  setTimeout(() => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

exportBtn.addEventListener('click', () => {
  const goals = loadGoals();
  const blob = new Blob([JSON.stringify(goals, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'goals.json'; a.click();
  URL.revokeObjectURL(url);
});

const importFileInput = document.getElementById('importFileInput');
importBtn.addEventListener('click', () => { importFileInput.value = ''; importFileInput.click(); });

importFileInput.addEventListener('change', () => {
  const file = importFileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let imported;
    try { imported = JSON.parse(e.target.result); }
    catch { alert('Invalid JSON file.'); return; }
    if (!Array.isArray(imported) || imported.some(g => typeof g.text !== 'string')) {
      alert("This doesn't look like a valid goals.json file."); return;
    }
    const existing = loadGoals();
    if (existing.length > 0) showImportConfirmModal(imported);
    else doImport(imported);
  };
  reader.readAsText(file);
});

function doImport(goals) {
  const normalised = goals.map(g => ({
    id: g.id || Date.now().toString() + Math.random(),
    text: g.text.slice(0, MAX)
  }));
  saveGoals(normalised);
  getCards().forEach(c => c.remove());
  normalised.forEach(g => renderGoal(g.text, g.id));
}

function showImportConfirmModal(pendingGoals) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal-box';
  const p = document.createElement('p');
  p.innerHTML = 'You already have goals, importing these goals will <span class="override-word">override</span> the existing goals. Are you sure?';
  const actions = document.createElement('div');
  actions.className = 'modal-actions';
  const noBtn = document.createElement('button');
  noBtn.className = 'modal-no-btn'; noBtn.textContent = 'No!';
  const yesBtn = document.createElement('button');
  yesBtn.className = 'modal-yes-btn'; yesBtn.textContent = 'Yes!';
  noBtn.addEventListener('click', () => overlay.remove());
  yesBtn.addEventListener('click', () => { overlay.remove(); doImport(pendingGoals); });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  actions.appendChild(noBtn); actions.appendChild(yesBtn);
  box.appendChild(p); box.appendChild(actions);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

let notifBtnLastClick = 0;
let swReg = null;

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('mtgoals_sw', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction('kv', 'readwrite');
    const req = tx.objectStore('kv').put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

async function syncToIDB() {
  const goals    = loadGoals();
  const schedule = getNotifSchedule();
  const next     = localStorage.getItem(MT_NOTIF_NEXT);
  await Promise.all([
    idbSet('monkeytype_goals',                goals),
    idbSet('monkeytype_goals_notif_schedule', schedule),
    idbSet('monkeytype_goals_notif_next',     next),
  ]);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    swReg = reg;
    if ('periodicSync' in reg) {
      const schedule = getNotifSchedule();
      const minInterval = schedule && schedule.ms ? schedule.ms : 86400000;
      reg.periodicSync.register('goal-reminder', { minInterval }).catch(() => {});
    }
  }).catch(() => {});
}

function updateNotifBtnState() {
  const schedule = getNotifSchedule();
  const granted  = localStorage.getItem(MT_NOTIF_GRANTED) === 'true';
  if (granted && schedule && schedule.type !== 'never') notifBtn.classList.add('active');
  else notifBtn.classList.remove('active');
}

function getNotifSchedule() {
  try { return JSON.parse(localStorage.getItem(MT_NOTIF_KEY)) || null; }
  catch { return null; }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function pickRandomGoal() {
  const goals = loadGoals();
  if (!goals.length) return null;
  return goals[Math.floor(Math.random() * goals.length)].text;
}

async function scheduleNextNotification(schedule) {
  if (!schedule || schedule.type === 'never' || !schedule.ms) return;
  const next = Date.now() + schedule.ms;
  localStorage.setItem(MT_NOTIF_NEXT, next.toString());
  await syncToIDB();
  if (swReg && 'periodicSync' in swReg) {
    swReg.periodicSync.register('goal-reminder', { minInterval: schedule.ms }).catch(() => {});
  }
}

async function checkAndFireNotification() {
  const granted = localStorage.getItem(MT_NOTIF_GRANTED) === 'true';
  if (!granted) return;
  const schedule = getNotifSchedule();
  if (!schedule || schedule.type === 'never' || !schedule.ms) return;
  if (Notification.permission !== 'granted') return;
  const nextStr = localStorage.getItem(MT_NOTIF_NEXT);
  const now = Date.now();
  if (!nextStr) { await scheduleNextNotification(schedule); return; }
  const next = parseInt(nextStr, 10);
  if (now >= next) {
    const goal = pickRandomGoal();
    if (goal) new Notification('Goal Reminder', { body: goal, icon: '/images/mtg.png' });
    await scheduleNextNotification(schedule);
  }
}

notifBtn.addEventListener('click', async () => {
  const now = Date.now();
  const timeSinceLast = now - notifBtnLastClick;
  notifBtnLastClick = now;
  if (timeSinceLast < 1000) {
    if (typeof window.NotifPopup !== 'undefined') {
      window.NotifPopup.show(async (savedSchedule) => {
        if (savedSchedule.type !== 'never') {
          const granted = await requestNotifPermission();
          if (granted) {
            localStorage.setItem(MT_NOTIF_GRANTED, 'true');
            await scheduleNextNotification(savedSchedule);
          }
        } else {
          localStorage.removeItem(MT_NOTIF_NEXT);
          await syncToIDB();
        }
        updateNotifBtnState();
      });
    }
    return;
  }
  const granted = await requestNotifPermission();
  if (granted) {
    localStorage.setItem(MT_NOTIF_GRANTED, 'true');
    const existing = getNotifSchedule();
    if (!existing || existing.type === 'never') {
      const defaultSchedule = { type: 'everyday', ms: 86400000 };
      localStorage.setItem(MT_NOTIF_KEY, JSON.stringify(defaultSchedule));
      await scheduleNextNotification(defaultSchedule);
    }
    updateNotifBtnState();
    const goal = pickRandomGoal();
    if (goal) new Notification('Goal Reminder', { body: goal, icon: '/images/mtg.png' });
    await syncToIDB();
  }
});

updateNotifBtnState();
syncToIDB().catch(() => {});
checkAndFireNotification();
setInterval(checkAndFireNotification, 60000);
</script>
