<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monkeytype Goals</title>
  <link rel="icon" type="image/png" href="/images/mtg.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
    }

    /* ── Compose (Old Design Style) ── */
    #compose {
      background: #2b2d31;
      border-radius: 8px 8px 0 0;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2px;
    }
    #compose-top { display: flex; align-items: flex-start; gap: 12px; }
    #compose-name {
      color: #e2b714;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      padding-top: 5px;
      flex-shrink: 0;
      cursor: pointer;
    }
    #compose textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      resize: none;
      min-height: 42px;
      line-height: 1.6;
      padding-top: 3px;
    }
    #compose-footer { display: flex; align-items: center; justify-content: space-between; }
    #reply-hint { color: #e2b714; font-size: 0.7rem; font-weight: 500; }
    #post-btn {
      background: #e2b714;
      border: none;
      border-radius: 6px;
      color: #1a1a1a;
      cursor: pointer;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 7px 16px;
    }

    /* ── Feed & Post Cards (Old Design Style) ── */
    .post-card {
      background: #2b2d31;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .post-header { display: flex; justify-content: space-between; }
    .post-name { color: #e2b714; font-size: 0.78rem; font-weight: 500; margin-bottom: 5px; }
    .post-content { color: #fff; font-size: 0.88rem; line-height: 1.65; white-space: pre-wrap; }
    .post-time { color: rgba(255,255,255,0.25); font-size: 0.7rem; margin-top: 7px; }

    /* ── Nesting Logic ── */
    .replies-container {
      margin-left: 24px;
      border-left: 2px solid rgba(255,255,255,0.05);
      margin-top: 10px;
    }
    .reply-card {
        padding: 10px 16px;
        background: rgba(0,0,0,0.1);
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .view-more-btn {
        color: #e2b714;
        font-size: 0.7rem;
        padding: 10px 16px;
        cursor: pointer;
        opacity: 0.6;
    }
    .view-more-btn:hover { opacity: 1; }

    .reply-icon { width: 14px; height: 14px; fill: rgba(255,255,255,0.2); cursor: pointer; transition: 0.2s; }
    .reply-icon:hover { fill: #e2b714; }

    /* ── Name Modal ── */
    #name-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #name-modal {
      background: #2b2d31; border-radius: 10px; padding: 28px 24px; width: 380px;
    }
    #name-input {
      width: 100%; background: #1e1f22; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: #fff; padding: 10px; font-family: 'Roboto Mono'; outline: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="compose">
    <div id="compose-top">
      <span id="compose-name" onclick="handleNameClick()">set name…</span>
      <textarea id="compose-ta" placeholder="What's your goal?" maxlength="280"></textarea>
    </div>
    <div id="compose-footer">
      <span id="reply-hint"></span>
      <button id="post-btn">Post</button>
    </div>
  </div>

  <div id="posts-feed"></div>
</div>

<div id="name-modal-overlay" style="display:none;">
  <div id="name-modal">
    <h2 style="color:#fff; font-size:0.95rem; margin-bottom:10px;">Choose display name</h2>
    <p style="color:rgba(255,255,255,0.4); font-size:0.75rem; margin-bottom:15px;">Changeable once every 30 days.</p>
    <input id="name-input" type="text" maxlength="20" placeholder="your name...">
    <button id="save-name-btn" style="background:#e2b714; border:none; padding:8px 15px; border-radius:6px; margin-top:15px; cursor:pointer; width:100%; font-weight:600;">Save Name</button>
  </div>
</div>

<script>
  const sbUrl = "sburl";
  const sbKey = "sbkey";
  const NAME_KEY = 'mtg_user_name';
  const DATE_KEY = 'mtg_name_date';

  let myName = localStorage.getItem(NAME_KEY) || '';
  let replyingTo = null;

  function sbHeaders() {
    return { "apikey": sbKey, "Authorization": `Bearer ${sbKey}`, "Content-Type": "application/json" };
  }

  // --- Name Lock ---
  function handleNameClick() {
    if (replyingTo) { cancelReply(); return; }
    const last = localStorage.getItem(DATE_KEY);
    if (last) {
      const diff = (Date.now() - parseInt(last)) / (1000 * 60 * 60 * 24);
      if (diff < 30) {
        alert(`Name locked. Wait ${Math.ceil(30 - diff)} more days.`);
        return;
      }
    }
    document.getElementById('name-modal-overlay').style.display = 'flex';
  }

  document.getElementById('save-name-btn').onclick = () => {
    const val = document.getElementById('name-input').value.trim();
    if (val) {
      localStorage.setItem(NAME_KEY, val);
      localStorage.setItem(DATE_KEY, Date.now().toString());
      myName = val;
      document.getElementById('compose-name').textContent = myName;
      document.getElementById('name-modal-overlay').style.display = 'none';
    }
  };

  // --- Reply Logic ---
  function startReply(id, name) {
    replyingTo = id;
    document.getElementById('reply-hint').textContent = `replying to ${name}`;
    document.getElementById('compose-name').textContent = "cancel";
    document.getElementById('compose-ta').focus();
  }

  function cancelReply() {
    replyingTo = null;
    document.getElementById('reply-hint').textContent = "";
    document.getElementById('compose-name').textContent = myName;
  }

  // --- Feed Logic ---
  async function loadFeed() {
    const res = await fetch(`${sbUrl}/rest/v1/posts?select=*&order=created_at.desc`, { headers: sbHeaders() });
    const all = await res.json();
    const mainPosts = all.filter(p => !p.parent_id);
    const replies = all.filter(p => p.parent_id);
    
    const feed = document.getElementById('posts-feed');
    feed.innerHTML = '';
    
    mainPosts.forEach(post => {
      const postReplies = replies.filter(r => r.parent_id === post.id).reverse();
      const card = document.createElement('div');
      card.className = 'post-card';
      
      const sliced = postReplies.slice(0, 5);
      const hidden = postReplies.slice(5);

      card.innerHTML = `
        <div class="post-header">
          <div class="post-name">${post.display_name}</div>
          <svg class="reply-icon" onclick="startReply(${post.id}, '${post.display_name}')" viewBox="0 0 24 24"><path d="M20,3H4A2,2,0,0,0,2,5V22l5.36-5H20a2,2,0,0,0,2-2V5A2,2,0,0,0,20,3Z"></path></svg>
        </div>
        <div class="post-content">${post.content}</div>
        <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
        <div class="replies-container">
          ${sliced.map(r => `<div class="reply-card"><div class="post-name">${r.display_name}</div><div class="post-content">${r.content}</div></div>`).join('')}
          <div id="hidden-${post.id}" style="display:none;">
            ${hidden.map(r => `<div class="reply-card"><div class="post-name">${r.display_name}</div><div class="post-content">${r.content}</div></div>`).join('')}
          </div>
          ${hidden.length > 0 ? `<div class="view-more-btn" onclick="document.getElementById('hidden-${post.id}').style.display='block'; this.style.display='none'">+ View ${hidden.length} more replies</div>` : ''}
        </div>
      `;
      feed.appendChild(card);
    });
  }

  document.getElementById('post-btn').onclick = async () => {
    const text = document.getElementById('compose-ta').value.trim();
    if (!text || !myName) return;
    await fetch(`${sbUrl}/rest/v1/posts`, {
      method: 'POST',
      headers: sbHeaders(),
      body: JSON.stringify({ display_name: myName, content: text, parent_id: replyingTo })
    });
    location.reload();
  };

  if (!myName) document.getElementById('name-modal-overlay').style.display = 'flex';
  else document.getElementById('compose-name').textContent = myName;
  loadFeed();
</script>
</body>
</html>
